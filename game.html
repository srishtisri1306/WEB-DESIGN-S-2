<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINECRAFT</title>
<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
}
.container{
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
}
.container img{
    width: 100%;
    height: 100%;
    object-fit: cover;
}
h1{
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 100px;
    color: #0b0b82;
    letter-spacing: 5px;
    text-transform: uppercase;
    text-shadow: 
        3px 3px 0 #999,
        6px 6px 0 #666,
        9px 9px 0 #333,
        12px 12px 15px rgba(0,0,0,0.6);
}
.inside{
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
}
.inside button{
    width: 250px;
    height: 50px;
    font-size: 18px;
    font-weight: bold;
    background-color: #0b7617;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}
.inside button:hover{
    background-color: #0b7617;
    transform: scale(1.05);
}
</style>
</head>
<body>
<div class="container">
    <img src="https://pbs.twimg.com/media/F_tvohnacAIhrs5?format=jpg&name=4096x4096">
    <h1>Minecraft</h1>
    <div class="inside">
        <button>Single Player</button>
        <button>Multi Player</button>
        <button>Minecraft Realms</button>
        <button>Options</button>
        <button>Quit Game</button>
    </div>
</div>
</body>
</html>
